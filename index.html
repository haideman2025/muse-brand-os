<style>
  :root{--bg:#0F1923;--panel:#16222e;--panel2:#1b2a38;--line:#27384a;--teal:#00D4AA;--coral:#E85B5B;--blue:#4A9EFF;--gold:#F2C14E;--pink:#E85BAE;--txt:#E8EEF3;--mut:#8DA1B3;--ok:#2ec27e;--bad:#E85B5B}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.55}
  .app{display:grid;grid-template-columns:268px 1fr;min-height:100vh}
  aside{background:#0c151d;border-right:1px solid var(--line);padding:20px 16px;position:sticky;top:0;height:100vh;overflow:auto}
  .logo{font-weight:800;font-size:17px;color:var(--teal);letter-spacing:.4px}
  .logo small{display:block;color:var(--mut);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
  .charbar{margin-top:14px;padding:10px;border:1px solid var(--line);border-radius:8px;background:#0e1822}
  .charbar select{font-size:13px;padding:7px 9px;margin-top:6px}
  .charcount{font-size:10.5px;color:var(--mut)}
  .charbtns{display:flex;gap:5px;margin-top:7px}
  .charbtns button{flex:0 0 auto;background:#1d2c3a;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:12px;font-weight:700}
  .charbtns button:first-child{flex:1 1 auto;color:var(--teal)}
  .charbtns button:hover{border-color:var(--teal);color:var(--teal)}
  .steps{margin-top:18px;display:flex;flex-direction:column;gap:3px}
  .grp{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#5b7187;text-transform:uppercase;margin:14px 4px 4px}
  .step{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--mut);border:1px solid transparent}
  .step:hover{background:#10212c}
  .step.active{background:#10262b;border-color:var(--teal);color:var(--txt)}
  .step .num{width:22px;height:22px;border-radius:50%;background:#1d2c3a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .step.done .num{background:var(--ok);color:#04210f}
  .step .badge{margin-left:auto;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px}
  .b-ok{background:#10331f;color:var(--ok)}.b-rev{background:#33300f;color:var(--gold)}.b-bad{background:#3a1d1f;color:var(--coral)}
  .ovr{margin-top:18px;padding:12px;border:1px dashed var(--line);border-radius:8px;font-size:12px;color:var(--mut)}
  .ovr .big{font-size:26px;font-weight:800;color:var(--teal)}
  main{padding:30px 34px 80px;max-width:980px}
  h1{font-size:24px;margin-bottom:4px}
  h2{font-size:19px;margin:4px 0 6px}
  .lead{color:var(--mut);font-size:14px;margin-bottom:20px}
  label{display:block;font-size:12.5px;color:var(--mut);font-weight:600;margin:12px 0 5px}
  label .req{color:var(--coral)}
  input,select,textarea{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal)}
  textarea{min-height:92px;resize:vertical;line-height:1.5}
  textarea.big{min-height:340px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#06241f;border:none;border-radius:8px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
  .btn:hover{filter:brightness(1.08)}.btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.blue{background:var(--blue);color:#04203f}.btn.gold{background:var(--gold);color:#2a2400}.btn.coral{background:var(--coral);color:#2a0c0c}.btn.pink{background:var(--pink);color:#2a0c1f}
  .btn.sm{padding:7px 12px;font-size:12.5px;margin-top:0}
  .bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
  .hint{font-size:12px;color:var(--mut);margin-top:6px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;margin-top:16px}
  .note{font-size:12.5px;color:var(--mut);padding:12px 14px;border:1px dashed var(--line);border-radius:8px;margin-top:14px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#1d2c3a;color:var(--mut);margin:2px 4px 2px 0}
  .score-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
  .score-tbl th,.score-tbl td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
  .score-tbl th{background:var(--panel2);color:var(--teal);font-size:11px;text-transform:uppercase}
  .scorehead{display:flex;align-items:center;gap:12px;margin-top:14px}
  .scorehead .total{font-size:30px;font-weight:800}
  .status-line{font-size:12px;color:var(--mut);margin-top:8px}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#06241f;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--teal);color:#06241f;padding:11px 20px;border-radius:30px;font-weight:700;font-size:13px;opacity:0;transition:.3s;z-index:200}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .err{background:#2a1416;border:1px solid var(--coral);color:#ffb3b3;padding:10px 12px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
  .overlay{position:fixed;inset:0;background:rgba(7,12,17,.9);display:flex;align-items:center;justify-content:center;z-index:120;padding:20px}
  .ovbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;max-width:620px;width:100%;max-height:90vh;overflow:auto}
  .piperow{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:8px;margin-top:8px;font-size:13.5px}
  .piperow .pnum{width:22px;height:22px;border-radius:50%;background:#1d2c3a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .piperow .pt{flex:1}.piperow .ps{font-size:12px;color:var(--mut);text-align:right;min-width:130px}
  .piperow[data-state=done]{border-color:var(--ok)}.piperow[data-state=running]{border-color:var(--blue)}.piperow[data-state=error]{border-color:var(--coral)}
  .portrait{width:100%;max-width:300px;border-radius:12px;border:1px solid var(--line);display:block;margin-top:10px}
  .pf-grid{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
  .kv{font-size:13px;margin:7px 0}.kv b{color:var(--teal);display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
  /* studio */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 4px}
  .tab{padding:8px 15px;border:1px solid var(--line);border-radius:30px;color:var(--mut);font-size:13px;cursor:pointer;font-weight:700;background:transparent}
  .tab.active{background:var(--teal);color:#06241f;border-color:var(--teal)}
  .uploadbox{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;cursor:pointer;color:var(--mut);font-size:13px}
  .uploadbox:hover{border-color:var(--teal);color:var(--txt)}
  .imgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:14px}
  .imgcard{position:relative;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#0e1822}
  .imgcard img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover}
  .imgcard .ov{position:absolute;inset:auto 0 0 0;display:flex;gap:4px;padding:6px;background:linear-gradient(transparent,rgba(0,0,0,.7))}
  .imgcard .ov button{flex:1;font-size:11px;padding:5px;border:none;border-radius:6px;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;font-weight:700}
  .imgcard .ov button:hover{background:var(--teal);color:#06241f}
  .idea-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;margin-top:8px;font-size:13px}
  .idea-item .t{flex:1}.idea-item .nm{font-weight:700}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:20px;margin:3px 5px 0 0;cursor:pointer;color:var(--txt)}
  .chip:hover{border-color:var(--teal)}.chip.on{background:#10262b;border-color:var(--teal)}
  @media(max-width:820px){.app{grid-template-columns:1fr}aside{position:static;height:auto}main{padding:20px}.row,.row3{grid-template-columns:1fr}.pf-grid{grid-template-columns:1fr}}
</style>

<style>
/* ===== TWILIGHT DREAM reskin (đè lên base) ===== */
:root{
  --sky:linear-gradient(168deg,#0C0926 0%,#1E1550 32%,#3E2569 60%,#6E3A6A 84%,#9A5470 100%);
  --a1:#C2B2FF;--a2:#8E7BFF;--acc:#C9B6FF;--g1:#8E7BFF;--g2:#E68AA0;--g3:#5BC8C8;--ink:#1a1140;
  --bg:#0d0a22;--panel:rgba(255,255,255,.06);--panel2:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.12);--teal:var(--acc);--txt:#F3EEFF;--mut:#A99CC8;
  --ok:#6FE3D2;--coral:#E85B5B;--gold:#F2C14E;--blue:#7C9CFF;--pink:#E68AA0;--bad:#E85B5B;
}
body{background:var(--sky);background-attachment:fixed;font-family:'Plus Jakarta Sans',-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--txt)}
.app{background:transparent}
main{position:relative;z-index:1}
aside{background:rgba(12,9,28,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:1px solid var(--line)}
.logo{font-family:'Instrument Serif',serif;font-weight:400;font-size:23px;color:var(--acc);letter-spacing:.3px;text-shadow:0 0 22px rgba(183,166,255,.35)}
.logo small{color:var(--mut);font-weight:600}
h1{font-family:'Playfair Display','Instrument Serif',serif;font-weight:600;letter-spacing:.1px;color:var(--txt);font-size:29px}
h2{font-family:'Playfair Display','Instrument Serif',serif;font-weight:600;color:var(--txt);font-size:20px}
.lead{color:#B3A6D0}
label{color:#C9BEE6}
input,select,textarea{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);color:var(--txt);border-radius:14px}
input:focus,textarea:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(183,166,255,.16)}
.card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:22px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 16px 48px -18px rgba(120,80,210,.55),inset 0 1px 0 rgba(255,255,255,.08)}
.note{border:1px dashed var(--line);color:#B3A6D0;border-radius:14px;background:rgba(255,255,255,.03)}
.btn{background:linear-gradient(135deg,var(--a1),var(--a2));color:var(--ink);border-radius:14px;box-shadow:0 12px 30px -10px rgba(142,123,255,.7);font-weight:700}
.btn.ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);color:var(--txt);box-shadow:none}
.btn.blue{background:linear-gradient(135deg,#9FB4FF,#7C9CFF);color:#06183a}
.btn.gold{background:linear-gradient(135deg,#F7D98C,#F2C14E);color:#2a2400}
.btn.coral{background:linear-gradient(135deg,#F08AA0,#E85B5B);color:#2a0c0c}
.btn.pink{background:linear-gradient(135deg,#F2A8C8,#E68AA0);color:#2a0c1f}
.grp{color:#7d72a0}
.step{border-radius:12px}
.step:hover{background:rgba(255,255,255,.05)}
.step.active{background:rgba(183,166,255,.14);border-color:var(--acc);color:var(--txt)}
.step .num{background:rgba(255,255,255,.08)}
.step.done .num{background:var(--ok);color:#06241f}
.b-ok{background:rgba(111,227,210,.16);color:var(--ok)}
.b-rev{background:rgba(242,193,78,.16);color:var(--gold)}
.b-bad{background:rgba(232,91,91,.18);color:var(--coral)}
.ovr{border:1px dashed var(--line)}
.ovr .big{color:var(--acc);font-family:'Playfair Display',serif;font-weight:600}
.charbar{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px}
.charbtns button{background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--txt)}
.charbtns button:first-child{color:var(--acc)}
.toast{background:linear-gradient(135deg,var(--a1),var(--a2));color:var(--ink)}
.overlay{background:rgba(7,6,20,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ovbox{background:rgba(22,16,42,.94);border:1px solid var(--line);border-radius:22px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tab.active{background:linear-gradient(135deg,var(--a1),var(--a2));color:var(--ink);border-color:transparent}
.pill{border:1px solid var(--line)}
.score-tbl th{background:rgba(255,255,255,.06);color:var(--acc)}
.score-tbl td,.score-tbl th{border-color:var(--line)}
.scorehead .total{font-family:'Playfair Display',serif;font-weight:600}
.imgcard{border:1px solid var(--line);background:rgba(255,255,255,.04)}
.portrait{border:1px solid var(--line);border-radius:16px}
.uploadbox{border:2px dashed var(--line)}
.uploadbox:hover{border-color:var(--acc)}
.err{border-radius:14px}
/* aurora + stars */
.aurora,.star{position:fixed;pointer-events:none;z-index:-1}
.aurora{border-radius:50%;filter:blur(46px)}
.a-1{top:3%;left:5%;width:340px;height:340px;background:radial-gradient(circle,var(--g1),transparent 68%);opacity:.5;animation:auDrift 18s ease-in-out infinite}
.a-2{bottom:2%;right:4%;width:380px;height:380px;background:radial-gradient(circle,var(--g2),transparent 68%);opacity:.45;animation:auDrift 22s ease-in-out infinite reverse}
.a-3{top:44%;left:58%;width:300px;height:300px;background:radial-gradient(circle,var(--g3),transparent 70%);opacity:.3;animation:auDrift 26s ease-in-out infinite}
.star{width:3px;height:3px;border-radius:50%;background:#fff;box-shadow:0 0 6px #fff;animation:auTwinkle 4s ease-in-out infinite}
@keyframes auDrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(18px,-22px) scale(1.08)}}
@keyframes auTwinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
/* sky picker */
.skybar{margin-top:14px}
.skybar .lbl{font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#8E82AD;margin-bottom:7px}
.sky-sw{display:flex;gap:9px}
.sky-sw button{position:relative;width:22px;height:22px;border-radius:50%;border:none;padding:0;cursor:pointer;transition:transform .15s}
.sky-sw button:active{transform:scale(.88)}
.sky-sw button.on::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid #F3EEFF}
/* brand logo */
.brand{display:flex;align-items:center;gap:11px}
.brandmark{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 22px rgba(183,166,255,.5);flex-shrink:0;position:relative;overflow:hidden}
.brandmark::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 38%,rgba(255,255,255,.4),transparent 60%)}
.brandmark svg{width:30px;height:30px;position:relative;z-index:1}
.brandname{font-family:'Instrument Serif',serif;font-size:25px;color:#F3EEFF;line-height:1}
.brandtxt small{display:block;color:var(--mut);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
/* sound bar */
.soundbar{margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.soundbar button{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--txt);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.soundbar button.on{background:rgba(183,166,255,.18);border-color:var(--acc);color:var(--acc)}
.soundbar .sl{font-size:9.5px;color:#8E82AD;letter-spacing:1px;text-transform:uppercase}
/* landing */
#landing{position:fixed;inset:0;z-index:700;overflow-y:auto;background:var(--sky);background-attachment:fixed;color:var(--txt);font-family:'Plus Jakarta Sans',sans-serif}
.overlay{z-index:600}
.toast{z-index:900}
.lp-wrap{max-width:940px;margin:0 auto;padding:42px 22px 80px;position:relative;z-index:1}
.lp-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:34px;flex-wrap:wrap}
.lp-badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C9BEE6;background:rgba(255,255,255,.06);border:1px solid var(--line);padding:6px 13px;border-radius:20px}
.lp-hero h1{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(32px,6vw,56px);line-height:1.1;margin:16px 0 14px}
.lp-hero h1 em{font-style:italic;color:var(--acc)}
.lp-sub{font-size:16px;line-height:1.7;color:#B3A6D0;max-width:640px;margin:0 0 24px}
.lp-cta{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--a1),var(--a2));color:var(--ink);border:none;border-radius:16px;padding:15px 26px;font-size:15.5px;font-weight:700;cursor:pointer;box-shadow:0 16px 40px -10px rgba(142,123,255,.8)}
.lp-cta:hover{filter:brightness(1.06)}
.lp-cta.ghost{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--txt);box-shadow:none}
.lp-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:#9E92BE;margin-top:20px}
.lp-sec{margin-top:52px}
.lp-h{font-family:'Playfair Display',serif;font-weight:600;font-size:25px;margin-bottom:6px}
.lp-d{color:#B3A6D0;font-size:14px;margin-bottom:18px;max-width:640px}
.lp-flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.lp-step{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:16px;padding:16px;backdrop-filter:blur(12px)}
.lp-step .n{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;margin-bottom:10px}
.lp-step b{display:block;font-size:14px;margin-bottom:3px}
.lp-step span{font-size:12px;color:#A99CC8;line-height:1.5}
.lp-feat{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.lp-card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:18px;padding:18px;backdrop-filter:blur(12px)}
.lp-card .ic{font-size:24px;margin-bottom:8px}
.lp-card b{display:block;font-size:15px;margin-bottom:5px}
.lp-card p{font-size:13px;color:#B3A6D0;line-height:1.6;margin:0}

.gpill .dot{width:6px;height:6px;border-radius:50%;background:#6FE3D2;box-shadow:0 0 8px #6FE3D2}
@media(max-width:820px){
  #mtop{display:flex;align-items:center;gap:10px;position:fixed;top:0;left:0;right:0;height:56px;padding:0 14px;background:rgba(12,9,28,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:200}

  #mnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:200;background:rgba(12,9,28,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:6px 6px 10px}
  #mnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:#6E6394;cursor:pointer;padding:6px 0;font-size:10px;font-weight:600}
  #mnav button .mi{font-size:18px;line-height:1}
  #mnav button.on{color:var(--acc)}
  #mnav button.on .mi{filter:drop-shadow(0 0 6px var(--acc))}
  .app{display:block}
  aside{position:fixed;top:0;left:-92vw;width:86vw;max-width:330px;height:100vh;height:100dvh;z-index:500;transition:left .28s ease;border-right:1px solid var(--line);background:rgba(10,8,22,.98);padding:18px 16px 80px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  body.drawer-open{overflow:hidden}
  body.drawer-open aside{left:0;box-shadow:0 0 60px rgba(0,0,0,.6)}
  #mdrawerbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:480}
  body.drawer-open #mdrawerbg{display:block}
  main{padding:74px 16px 96px;max-width:100%}
}
@media (prefers-reduced-motion: reduce){.aurora,.star{animation:none!important;transition:none!important}aside{transition:none!important}}

<body>
<div class="aurora a-1"></div><div class="aurora a-2"></div><div class="aurora a-3"></div>
<div class="star" style="top:12%;left:22%"></div><div class="star" style="top:26%;left:78%;animation-delay:.8s"></div><div class="star" style="top:62%;left:14%;width:2px;height:2px;animation-delay:1.4s"></div><div class="star" style="top:74%;left:84%;animation-delay:.3s"></div><div class="star" style="top:8%;left:52%;width:2px;height:2px;animation-delay:2s"></div>
<div class="app">
  <aside>
    <div class="brand">
      <span class="brandmark"><svg viewBox="0 0 512 512" fill="none"><g transform="translate(0 6)" fill="#1A1140" fill-opacity="0.94"><path d="M135 256C160 234 196 226 226 228C238 229 248 234 256 242C264 234 274 229 286 228C316 226 352 234 377 256C320 268 290 266 256 263C222 266 192 268 135 256Z"/><path d="M141 262C194 271 224 270 256 268C288 270 318 271 371 262C360 310 316 348 256 348C196 348 152 310 141 262Z"/></g><ellipse cx="312" cy="300" rx="30" ry="11" transform="rotate(-18 312 300)" fill="#fff" fill-opacity="0.4"/><path d="M396 158l9 27 27 9-27 9-9 27-9-27-27-9 27-9z" fill="#fff" fill-opacity="0.92"/></svg></span>
      <div class="brandtxt"><div class="brandname">Muse</div><small>Digital Twin Studio</small></div>
    </div>
    <div id="charbar"></div>
    <div id="skybar"></div>
    <div id="soundbar"></div>
    <button class="btn gold" style="width:100%;margin-top:14px;justify-content:center" onclick="openDojoDialog()">🚀 Gửi sang Viral Dojo</button>
    <div class="steps" id="steps"></div>
    <div class="ovr">Overall<br><span class="big" id="ovrScore">—</span><div id="ovrNote">Hoàn thành các giai đoạn để xem điểm tổng.</div></div>
    <div class="hint" style="margin-top:14px">Key &amp; dữ liệu lưu cục bộ; ảnh lưu IndexedDB. Chỉ gọi tới Google Gemini.</div>
  </aside>

</div>
<div id="mtop"></div>
<div id="mdrawerbg" onclick="closeDrawer()"></div>
<div id="mnav"></div>
<div class="toast" id="toast">✓</div>

<script>
/* =========================================================
   MUSE BRAND OS — single-file client app (Gemini)
   Persona/Digital-Twin → Photo Studio → Brand strategy → export
   ========================================================= */
const LS="muse_state_v1";
const CHAR_FIELDS=['idea','persona','intake','outputs','scores','gallery','wardrobe'];
function blankChar(name){return {name:name||"Nhân vật 1",createdAt:_today10(),updatedAt:_today10(),idea:"",persona:{},intake:{},outputs:{},scores:{},gallery:[],wardrobe:[]};}
let __migratedLegacy=false;
/* Migration → workspace đa nhân vật (v2). Giữ settings toàn cục ở gốc; mỗi nhân vật 1 gói dna riêng. */
function migrateWS(r){
  if(r&&r.v===2&&r.characters&&r.activeId&&r.characters[r.activeId])return r;
  const g=r||{};const id='ch_'+Math.random().toString(36).slice(2,8);const ch=blankChar();
  let hadData=false;
  CHAR_FIELDS.forEach(k=>{if(g[k]!=null){ch[k]=g[k];hadData=true;}});
  if(g.persona&&g.persona.name)ch.name=g.persona.name;
  if(hadData)__migratedLegacy=true;
  return {v:2,
    apiKey:g.apiKey||"",modelText:g.modelText||"gemini-2.5-flash",modelImg:g.modelImg||"gemini-2.5-flash-image",lang:g.lang||"vi",
    ageOk:!!g.ageOk,_studioTab:g._studioTab||"twin",theme:g.theme||"twilight",
    sound:(g.sound!==undefined?!!g.sound:true),music:(g.music!==undefined?!!g.music:true),
    showLanding:(g.showLanding!==undefined?!!g.showLanding:!g.apiKey),
    activeId:id,characters:{[id]:ch},stage:g.stage||"setup"};
}
let S=migrateWS(JSON.parse(localStorage.getItem(LS)||"null"));
function activeChar(){if(!S.characters[S.activeId])S.activeId=Object.keys(S.characters)[0];const c=S.characters[S.activeId];CHAR_FIELDS.forEach(k=>{if(c[k]==null)c[k]=(k==='idea'?'':(k==='gallery'||k==='wardrobe'?[]:{}));});return c;}
/* S.persona / S.intake / S.outputs / S.scores / S.gallery / S.wardrobe / S.idea → trỏ vào nhân vật đang mở (non-enumerable: KHÔNG ghi trùng ra gốc localStorage). */
CHAR_FIELDS.forEach(prop=>{Object.defineProperty(S,prop,{configurable:true,enumerable:false,
  get(){return activeChar()[prop];},set(v){activeChar()[prop]=v;}});});
function save(){const c=S.characters&&S.characters[S.activeId];if(c)c.updatedAt=_today10();localStorage.setItem(LS,JSON.stringify(S));}
function syncCharName(){const c=S.characters[S.activeId];if(c&&S.persona&&S.persona.name)c.name=S.persona.name;}

/* ---------- QUẢN LÝ NHIỀU NHÂN VẬT ---------- */
function charList(){return Object.entries(S.characters).map(([id,c])=>({id,name:c.name}));}
function charSwitch(id){if(id&&S.characters[id]&&id!==S.activeId){S.activeId=id;__refCache={};save();render();}}
function charNew(){const id='ch_'+Math.random().toString(36).slice(2,8);
  S.characters[id]=blankChar('Nhân vật '+(Object.keys(S.characters).length+1));
  S.activeId=id;__refCache={};S.stage='idea';save();render();toast("Đã tạo nhân vật mới");}
function charRename(){const c=activeChar();const n=(prompt('Đổi tên nhân vật:',c.name||'')||'').trim();if(n){c.name=n;save();renderCharBar();renderSteps();}}
async function charDuplicate(){const src=activeChar();const id='ch_'+Math.random().toString(36).slice(2,8);
  S.characters[id]=JSON.parse(JSON.stringify({name:(src.name||'Nhân vật')+' (copy)',createdAt:_today10(),updatedAt:_today10(),idea:src.idea,persona:src.persona,intake:src.intake,outputs:src.outputs,scores:src.scores,wardrobe:src.wardrobe,gallery:[]}));
  try{const r=await IDB.get("ref:"+S.activeId);if(r)await IDB.put("ref:"+id,r);}catch(e){}
  S.activeId=id;__refCache={};save();render();toast("Đã nhân bản (ảnh Studio bắt đầu trống)");}
async function charDelete(){
  if(Object.keys(S.characters).length<=1){toast("Không thể xoá nhân vật cuối — tạo cái khác trước");return;}
  const c=activeChar();if(!confirm('Xoá nhân vật "'+(c.name||'')+'"? Không hồi lại được.'))return;
  const oldId=S.activeId;
  try{for(const g of (c.gallery||[]))await IDB.del("g:"+g.id);await IDB.del("ref:"+oldId);await IDB.del("portrait:"+oldId);}catch(e){}
  delete __refCache[oldId];delete S.characters[oldId];S.activeId=Object.keys(S.characters)[0];__refCache={};save();render();toast("Đã xoá nhân vật");}
/* ---------- THEME (5 bầu trời) ---------- */
const THEMES={
  twilight:{sky:'linear-gradient(168deg,#0C0926 0%,#1E1550 32%,#3E2569 60%,#6E3A6A 84%,#9A5470 100%)',a1:'#C2B2FF',a2:'#8E7BFF',acc:'#C9B6FF',g1:'#8E7BFF',g2:'#E68AA0',g3:'#5BC8C8'},
  dawn:{sky:'linear-gradient(168deg,#2A1330 0%,#5A2747 30%,#9A4A55 58%,#D98A63 84%,#F2C49B 100%)',a1:'#FFCDA6',a2:'#F2956E',acc:'#FFD0AE',g1:'#FF9E7A',g2:'#FFC8A0',g3:'#E66A9A'},
  aurora:{sky:'linear-gradient(168deg,#06122A 0%,#0E2A3E 32%,#124E4E 60%,#1E6E5A 84%,#3FA07A 100%)',a1:'#9DEBC8',a2:'#4FD0B0',acc:'#9FE8D2',g1:'#46E0B0',g2:'#5BC8E0',g3:'#7C9CFF'},
  rose:{sky:'linear-gradient(168deg,#1A0A24 0%,#3E1140 32%,#6E1E5A 60%,#A33A6E 84%,#D96E86 100%)',a1:'#FFB6E0',a2:'#E87AC8',acc:'#FFBEE6',g1:'#E87AC8',g2:'#FF8FA0',g3:'#9B7CFF'},
  midnight:{sky:'linear-gradient(168deg,#060A1A 0%,#0E1838 32%,#1E2A55 60%,#2E3A6E 84%,#46507E 100%)',a1:'#FFE3A0',a2:'#F2C46E',acc:'#FFE0A0',g1:'#F2C46E',g2:'#7C9CFF',g3:'#5BC8E0'}
};
const SKY_ORDER=['twilight','dawn','aurora','rose','midnight'];
const SKY_SW={twilight:'#3E2569,#9A5470',dawn:'#5A2747,#F2C49B',aurora:'#124E4E,#3FA07A',rose:'#6E1E5A,#D96E86',midnight:'#1E2A55,#F2C46E'};
function applyTheme(n){const t=THEMES[n]||THEMES.twilight;const r=document.documentElement;for(const k in t)r.style.setProperty('--'+k,t[k]);}
function setTheme(n){S.theme=n;save();applyTheme(n);renderSkyBar();const lp=document.getElementById('lpSky');if(lp)lp.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('on',SKY_ORDER[i]===n));}
function renderSkyBar(){const el=document.getElementById('skybar');if(!el)return;
  el.innerHTML='<div class="skybar"><div class="lbl">Bầu trời</div><div class="sky-sw">'+SKY_ORDER.map(n=>{const c=SKY_SW[n].split(',');return `<button title="${n}" class="${S.theme===n?'on':''}" style="background:linear-gradient(135deg,${c[0]},${c[1]})" onclick="setTheme('${n}')"></button>`;}).join('')+'</div></div>';}
/* ---------- ÂM THANH (Web Audio tổng hợp — không cần file ngoài) ---------- */
const Sound={ctx:null,music:null,musicGain:null,arp:null,
  init(){if(Sound.ctx)return;try{Sound.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}},
  resume(){try{if(Sound.ctx&&Sound.ctx.state==='suspended')Sound.ctx.resume();}catch(e){}},
  blip(freq,dur,type,vol,when){const c=Sound.ctx;if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0,when);g.gain.linearRampToValueAtTime(vol||0.1,when+0.012);g.gain.exponentialRampToValueAtTime(0.0001,when+dur);o.start(when);o.stop(when+dur+0.03);},
  sfx(name){if(!S.sound)return;Sound.init();if(!Sound.ctx)return;Sound.resume();const t=Sound.ctx.currentTime;
    if(name==='click')Sound.blip(640,0.08,'triangle',0.10,t);
    else if(name==='nav'){Sound.blip(440,0.1,'sine',0.09,t);Sound.blip(680,0.1,'sine',0.07,t+0.05);}
    else if(name==='success')[523,659,784,1047].forEach((f,i)=>Sound.blip(f,0.18,'triangle',0.1,t+i*0.07));
    else if(name==='gen'){Sound.blip(880,0.12,'sine',0.09,t);Sound.blip(1320,0.16,'sine',0.07,t+0.06);}
  },
  startMusic(){if(!S.music)return;Sound.init();if(!Sound.ctx||Sound.music)return;Sound.resume();const c=Sound.ctx;
    const master=c.createGain();master.gain.value=0;master.connect(c.destination);master.gain.linearRampToValueAtTime(0.07,c.currentTime+3);Sound.musicGain=master;
    const pads=[130.81,196.0,261.63].map(f=>{const o=c.createOscillator();o.type='sine';o.frequency.value=f;const g=c.createGain();g.gain.value=0.4;o.connect(g);g.connect(master);o.start();return {o,g};});
    const scale=[523.25,587.33,659.25,783.99,880.0,659.25];let step=0;
    Sound.arp=setInterval(()=>{if(!S.music||!Sound.ctx)return;const t=Sound.ctx.currentTime;const f=scale[step%scale.length];step++;const o=Sound.ctx.createOscillator(),g=Sound.ctx.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(master);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.16,t+0.06);g.gain.exponentialRampToValueAtTime(0.0001,t+1.5);o.start(t);o.stop(t+1.6);},1700);
    Sound.music={pads};},
  stopMusic(){if(Sound.arp){clearInterval(Sound.arp);Sound.arp=null;}if(Sound.musicGain&&Sound.ctx){try{Sound.musicGain.gain.linearRampToValueAtTime(0,Sound.ctx.currentTime+0.6);}catch(e){}}const m=Sound.music;Sound.music=null;if(m)setTimeout(()=>{try{m.pads.forEach(p=>p.o.stop());}catch(e){}},800);}
};
let __audioArmed=false;
function armAudio(){if(__audioArmed)return;__audioArmed=true;Sound.init();Sound.resume();if(S.music)Sound.startMusic();}
document.addEventListener('pointerdown',armAudio,{once:true});
document.addEventListener('keydown',armAudio,{once:true});
document.addEventListener('click',function(e){const b=e.target.closest('.btn,.lp-cta,.tab,.charbtns button,.sky-sw button,.soundbar button');if(b)Sound.sfx(b.classList.contains('lp-cta')?'nav':'click');},true);
function toggleSound(){S.sound=!S.sound;save();renderSoundBar();if(S.sound)Sound.sfx('success');}
function toggleMusic(){S.music=!S.music;save();renderSoundBar();Sound.init();Sound.resume();if(S.music)Sound.startMusic();else Sound.stopMusic();}
function renderSoundBar(){const el=document.getElementById('soundbar');if(!el)return;
  el.innerHTML=`<span class="sl">Âm thanh</span>
    <button class="${S.sound?'on':''}" title="Hiệu ứng âm thanh" onclick="toggleSound()">${S.sound?'🔊':'🔇'}</button>
    <button class="${S.music?'on':''}" title="Nhạc nền" onclick="toggleMusic()">🎵</button>
    <button title="Giới thiệu Muse" onclick="openLanding()" style="width:auto;padding:0 10px">ⓘ</button>`;}

/* ---------- LANDING PAGE ---------- */
const LIPS_SVG=`<svg viewBox="0 0 512 512" fill="none"><g transform="translate(0 6)" fill="#1A1140" fill-opacity="0.94"><path d="M135 256C160 234 196 226 226 228C238 229 248 234 256 242C264 234 274 229 286 228C316 226 352 234 377 256C320 268 290 266 256 263C222 266 192 268 135 256Z"/><path d="M141 262C194 271 224 270 256 268C288 270 318 271 371 262C360 310 316 348 256 348C196 348 152 310 141 262Z"/></g><ellipse cx="312" cy="300" rx="30" ry="11" transform="rotate(-18 312 300)" fill="#fff" fill-opacity="0.4"/><path d="M396 158l9 27 27 9-27 9-9 27-9-27-27-9 27-9z" fill="#fff" fill-opacity="0.92"/></svg>`;
const LP_FLOW=[
 {t:"Thiết lập",d:"Dán Gemini key — chạy ngay trên máy bạn, không cài đặt."},
 {t:"Tạo cuộc sống mới",d:"Gõ 1 ý tưởng, AI dựng nháp nhân vật + mục tiêu kinh doanh."},
 {t:"Digital Twin",d:"Upload selfie → AI khoá một khuôn mặt nhất quán cho mọi ảnh."},
 {t:"Studio ảnh",d:"Thử makeup/trang phục/bối cảnh, dựng kho ảnh nhân vật."},
 {t:"Chiến lược 5 chương",d:"AI dệt brand strategy & tự chấm điểm theo rubric 100đ."},
 {t:"Xuất & Xây kênh",d:"Tải bộ file chuẩn hoặc gửi thẳng sang Viral Dojo."}
];
const LP_FEATS=[
 {ic:"🎭",t:"Digital Twin nhất quán",d:"Một khuôn mặt neo, xuyên suốt mọi ảnh — không lệch nhân vật giữa các bài đăng."},
 {ic:"📸",t:"Studio ảnh AI",d:"Photoshoot đa góc, tủ đồ, thư viện riêng tư lưu ngay trên máy bạn."},
 {ic:"🏆",t:"Quality Gate",d:"AI tự chấm điểm 5 giai đoạn theo rubric — biết khi nào nội dung đủ chuẩn."},
 {ic:"👥",t:"Nhiều nhân vật",d:"Mỗi nhân vật một không gian riêng: persona, ảnh, thương hiệu, điểm số."},
 {ic:"🎨",t:"5 bầu trời",d:"Đổi tông màu cả app tức thì — Twilight, Dawn, Aurora, Rose, Midnight."},
 {ic:"🔒",t:"Riêng tư tuyệt đối",d:"Client-side hoàn toàn; key & dữ liệu chỉ nằm trên trình duyệt của bạn."}
];
function lpSkyHTML(){return SKY_ORDER.map(n=>{const c=SKY_SW[n].split(',');return `<button title="${n}" class="${S.theme===n?'on':''}" style="background:linear-gradient(135deg,${c[0]},${c[1]})" onclick="setTheme('${n}')"></button>`;}).join('');}
function showLanding(){
  if(document.getElementById('landing'))return;
  const d=document.createElement('div');d.id='landing';
  d.innerHTML=`<div class="lp-wrap">
    <div class="lp-nav">
      <div class="brand"><span class="brandmark">${LIPS_SVG}</span><div class="brandtxt"><div class="brandname">Muse</div><small>Digital Twin Studio</small></div></div>
      <div class="sky-sw" id="lpSky">${lpSkyHTML()}</div>
    </div>
    <div class="lp-hero">
      <span class="lp-badge">✦ Khởi đầu mới</span>
      <h1>Cuộc đời cũ khép lại.<br><em>Một phiên bản mới</em> của bạn bắt đầu.</h1>
      <p class="lp-sub">Muse biến một ý tưởng thành <b>nhân vật ảo (Digital Twin)</b> có khuôn mặt nhất quán, một studio ảnh riêng, và một chiến lược thương hiệu hoàn chỉnh do AI tự dệt nên &amp; tự chấm điểm — rồi nối thẳng sang <b>Viral Dojo</b> để dựng kênh.</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="lp-cta" onclick="enterApp()">Dệt nên giấc mơ →</button>
        <button class="lp-cta ghost" onclick="document.getElementById('lpFlow').scrollIntoView({behavior:'smooth'})">Xem cách hoạt động</button>
      </div>
      <div class="lp-quote">"Nơi bạn được sống cuộc đời mình đã chọn."</div>
    </div>
    <div class="lp-sec" id="lpFlow">
      <div class="lp-h">Hành trình 6 bước</div>
      <div class="lp-d">Từ một ý tưởng thô đến bộ thương hiệu sẵn sàng xây kênh — AI đi cùng bạn từng bước.</div>
      <div class="lp-flow">${LP_FLOW.map((s,i)=>`<div class="lp-step"><div class="n">${i+1}</div><b>${esc(s.t)}</b><span>${esc(s.d)}</span></div>`).join('')}</div>
    </div>
    <div class="lp-sec">
      <div class="lp-h">Vì sao Muse</div>
      <div class="lp-feat">${LP_FEATS.map(f=>`<div class="lp-card"><div class="ic">${f.ic}</div><b>${esc(f.t)}</b><p>${esc(f.d)}</p></div>`).join('')}</div>
    </div>

/* ---------- IndexedDB: KV store cho mọi ảnh (key: portrait, ref, g:<id>, w:<id>) ---------- */
const IDB={db:null,
  open(){return new Promise((res,rej)=>{if(IDB.db)return res(IDB.db);const r=indexedDB.open("muse_media",1);
    r.onupgradeneeded=()=>{r.result.createObjectStore("portraits");};
    r.onsuccess=()=>{IDB.db=r.result;res(IDB.db);};r.onerror=()=>rej(r.error);});},
  async put(k,v){const db=await IDB.open();return new Promise((res,rej)=>{const t=db.transaction("portraits","readwrite");t.objectStore("portraits").put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});},
  async get(k){const db=await IDB.open();return new Promise((res,rej)=>{const t=db.transaction("portraits","readonly");const rq=t.objectStore("portraits").get(k);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error);});},
  async del(k){const db=await IDB.open();return new Promise((res,rej)=>{const t=db.transaction("portraits","readwrite");t.objectStore("portraits").delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
};

/* ---------- GEMINI REST ---------- */
function imgUrl(){return `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(S.modelImg)}:generateContent?key=${encodeURIComponent(S.apiKey)}`;}
function txtUrl(){return `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(S.modelText)}:generateContent?key=${encodeURIComponent(S.apiKey)}`;}
async function geminiText(prompt,jsonMode){
  if(!S.apiKey) throw new Error("Chưa nhập API key Gemini.");
  const body={contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7}};
  if(jsonMode) body.generationConfig.responseMimeType="application/json";
  const r=await fetch(txtUrl(),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){let t=await r.text();throw new Error("Gemini "+r.status+": "+t.slice(0,300));}
  const d=await r.json();
  const txt=d?.candidates?.[0]?.content?.parts?.map(p=>p.text).filter(Boolean).join("")||"";
  if(!txt) throw new Error("Gemini trả về rỗng (có thể bị chặn an toàn).");
  return txt;
}
async function geminiVision(prompt,imgDataUrl,jsonMode){
  if(!S.apiKey) throw new Error("Chưa nhập API key Gemini.");
  const clean=imgDataUrl.replace(/^data:image\/\w+;base64,/,'');
  const body={contents:[{parts:[{text:prompt},{inlineData:{mimeType:"image/jpeg",data:clean}}]}],generationConfig:{}};
  if(jsonMode) body.generationConfig.responseMimeType="application/json";
  const r=await fetch(txtUrl(),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){let t=await r.text();throw new Error("Gemini "+r.status+": "+t.slice(0,300));}
  const d=await r.json();
  return d?.candidates?.[0]?.content?.parts?.map(p=>p.text).filter(Boolean).join("")||"";
}
// opts: {ref:dataUrl|null|undefined}. undefined => dùng ref nhân vật nếu có.
async function geminiImage(prompt,opts){
  opts=opts||{};
  if(!S.apiKey) throw new Error("Chưa nhập API key Gemini.");
  const parts=[{text:prompt}];
  let ref = ('ref' in opts) ? opts.ref : await getRef();
  if(ref){const clean=ref.replace(/^data:image\/\w+;base64,/,'');parts.push({inlineData:{mimeType:"image/jpeg",data:clean}});}
  const body={contents:[{parts:parts}],generationConfig:{responseModalities:["IMAGE"]}};
  const r=await fetch(imgUrl(),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){let t=await r.text();throw new Error("Gemini image "+r.status+": "+t.slice(0,300));}
  const d=await r.json();
  for(const p of (d?.candidates?.[0]?.content?.parts||[])){if(p.inlineData&&p.inlineData.data)return "data:"+(p.inlineData.mimeType||"image/png")+";base64,"+p.inlineData.data;}
  throw new Error("Không nhận được ảnh (model ảnh có thể không khả dụng với key — đổi tên model ở Thiết lập).");
}
function parseJSON(t){t=t.trim().replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();return JSON.parse(t);}
function fileToDataUrl(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(file);});}

function go(id){S.stage=id;save();closeDrawer();render();window.scrollTo(0,0);}
function intakeOK(){return INTAKE_FIELDS.filter(f=>f.req).every(f=>S.intake[f.k]&&String(S.intake[f.k]).trim());}
function personaOK(){return !!(S.persona&&S.persona.name&&S.persona.niche);}
function renderSteps(){
  const el=document.getElementById('steps');el.innerHTML='';
  STEP_LIST.forEach((st,i)=>{
    if(st.grp){const g=document.createElement('div');g.className='grp';g.textContent=st.grp;el.appendChild(g);}
    let done=false;
    if(st.id==='setup')done=!!S.apiKey;
    else if(st.id==='idea')done=!!(S.persona&&S.persona.name)||!!S.idea;
    else if(st.id==='persona')done=personaOK();
    else if(st.id==='profile')done=!!(S.persona&&(S.persona.hasRef||S.persona.hasPortrait));
    else if(st.id==='studio')done=!!(S.gallery&&S.gallery.length);
    else if(st.id==='intake')done=intakeOK();
    else if(st.id==='export')done=false;
    else done=!!S.outputs[st.id];
    const sc=S.scores[st.id];
    let badge='';if(sc){const c=sc.ket_luan==='SHIP'?'b-ok':sc.ket_luan==='REVISE'?'b-rev':'b-bad';badge=`<span class="badge ${c}">${sc.tong}</span>`;}
    const d=document.createElement('div');d.className='step'+(S.stage===st.id?' active':'')+(done?' done':'');
    d.innerHTML=`<span class="num">${done?'✓':(i+1)}</span><span>${st.title}</span>${badge}`;
    d.onclick=()=>go(st.id);el.appendChild(d);
  });
  const ph=PHASES.filter(p=>S.scores[p.id]);
  const os=document.getElementById('ovrScore'),on=document.getElementById('ovrNote');
  if(ph.length){const ov=Math.round(ph.reduce((a,p)=>a+S.scores[p.id].tong,0)/ph.length);
    os.textContent=ov;on.textContent=(ov>=82?"Sẵn sàng xây kênh ✓":"Cần cải thiện để ≥82.")+` (${ph.length}/5 giai đoạn)`;
  }else{os.textContent="—";on.textContent="Hoàn thành các giai đoạn để xem điểm tổng.";}
}
function render(){
  renderCharBar();renderSkyBar();renderSoundBar();renderMobileChrome();renderSteps();const m=document.getElementById('main');const id=S.stage;
  if(id==='setup')return renderSetup(m);
  if(id==='idea')return renderIdea(m);
  if(id==='persona')return renderPersona(m);
  if(id==='profile')return renderProfile(m);
  if(id==='studio')return renderStudio(m);
  if(id==='intake')return renderIntake(m);
  if(id==='export')return renderExport(m);
  renderPhase(m,PHASES.find(p=>p.id===id));
}

async function aiConcept(){

async function runShoot(){
  readPS();if(!personaOK()){toast("Cần nhân vật");return;}
  if(!S.apiKey){toast('Chưa có API key');go('setup');return;}
  const er=document.getElementById('psErr');er.style.display='none';const b=document.getElementById('shootBtn');b.disabled=true;
  const out=document.getElementById('shootOut');
  const angles=PS.shots===4?["full body","medium shot","close up portrait","low angle"]:[PS.angle];
  const refOpt=PS.useRef?{}:{ref:null};
  for(let i=0;i<angles.length;i++){
    b.innerHTML=`<span class="spinner"></span> Đang chụp ${i+1}/${angles.length}...`;
    const ph=document.createElement('div');ph.className='imgcard';ph.innerHTML='<div style="aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;color:#5b7187"><span class="spinner"></span></div>';out.appendChild(ph);
    try{const prompt=shotPrompt({angle:angles[i],makeup:PS.makeup,outfit:PS.outfit,background:PS.background,pose:PS.pose});
      const img=await geminiImage(prompt,refOpt);
      const id=await addToGallery(img,[PS.makeup,PS.outfit,PS.background,angles[i]].filter(Boolean).join(' · '),'shot');
      ph.innerHTML=`<img src="${img}" alt=""><div class="ov"></div>`;
      ph.querySelector('img').dataset.gid=id;
      const ov=ph.querySelector('.ov');
      const mk=(label,fn)=>{const x=document.createElement('button');x.textContent=label;x.onclick=fn;ov.appendChild(x);};
      mk('⬇',()=>dlDataUrl("muse-"+id+".png",img));
      mk('📌 Neo',async()=>{await useAsRef(id);});
      mk('✕',()=>{delGallery(id);ph.remove();});
    }catch(e){ph.innerHTML=`<div style="padding:10px;font-size:11px;color:var(--coral)">${esc(e.message).slice(0,120)}</div>`;er.style.display='block';er.textContent=e.message;}
  }
  b.disabled=false;b.innerHTML='📸 Chụp';renderSteps();
}

function renderPhase(m,p){
  const out=S.outputs[p.id];const sc=S.scores[p.id];

    <button class="btn gold" onclick="runScore('${p.id}')" ${out?'':'disabled'}>Tự chấm điểm</button>
    ${p.note?`<span class="hint">${p.note}</span>`:''}

    ${p.n>1?`<button class="btn ghost" onclick="go('${PHASES[p.n-2].id}')">← Quay lại</button>`:`<button class="btn ghost" onclick="go('intake')">← Intake</button>`}
    ${p.n<5?`<button class="btn blue" onclick="go('${PHASES[p.n].id}')">Tiếp →</button>`:`<button class="btn blue" onclick="go('export')">Tới Xuất file →</button>`}
  </div>`;

function renderScore(sc,p){
  const c=sc.ket_luan==='SHIP'?'var(--ok)':sc.ket_luan==='REVISE'?'var(--gold)':'var(--coral)';
  let h=`<div class="card"><div class="scorehead"><span class="total" style="color:${c}">${sc.tong}</span><span class="hint">/100 · Gate ${p.gate} · <b style="color:${c}">${sc.ket_luan}</b></span></div>
  <table class="score-tbl"><tr><th>Yếu tố</th><th>Điểm</th><th>Lý do</th></tr>`;
  (sc.factors||[]).forEach(f=>h+=`<tr><td>${esc(f.ten)}</td><td>${esc(f.diem)}/${esc(f.trong_so)}</td><td>${esc(f.ly_do)}</td></tr>`);
  h+=`</table>${sc.ket_luan!=='SHIP'?'<div class="note">Điểm dưới chuẩn → sửa rồi chấm lại.</div>':''}</div>`;
  document.getElementById('scoreBox').innerHTML=h;
}
function busy(btnId,txtId,on,label){const b=document.getElementById(btnId);if(!b)return;b.disabled=on;if(txtId){document.getElementById(txtId).innerHTML=on?'<span class="spinner"></span> '+label:label;}}
async function runGen(id){const p=PHASES.find(x=>x.id===id);const err=document.getElementById('phErr');err.style.display='none';busy('genBtn','genTxt',true,'Đang tạo...');
  try{const j=parseJSON(await geminiText(genPrompt(p),true));S.outputs[id]=j;delete S.scores[id];save();render();toast("Đã tạo "+p.title);}
  catch(e){err.style.display='block';err.textContent=e.message;busy('genBtn','genTxt',false,'Tạo bằng AI');}}
async function runScore(id){const p=PHASES.find(x=>x.id===id);saveOut(id,true);const err=document.getElementById('phErr');err.style.display='none';
  if(!S.outputs[id]){err.style.display='block';err.textContent="Chưa có nội dung để chấm.";return;}toast("Đang chấm điểm...");
  try{const j=parseJSON(await geminiText(scorePrompt(p),true));S.scores[id]=j;save();renderSteps();renderScore(j,p);}
  catch(e){err.style.display='block';err.textContent=e.message;}}
function saveOut(id,silent){const box=document.getElementById('outBox');if(!box)return;try{S.outputs[id]=JSON.parse(box.value);delete S.scores[id];save();if(!silent){toast("Đã lưu");renderSteps();}}catch(e){if(!silent){const err=document.getElementById('phErr');err.style.display='block';err.textContent="JSON không hợp lệ: "+e.message;}}}

/* ---------- AUTO PIPELINE ---------- */
let __abort=false;
async function startAutoPipeline(){
  saveIntake();if(!intakeOK()){toast("Thiếu thông tin bắt buộc (*)");go('intake');return;}
  if(!S.apiKey){toast("Chưa có API key");go('setup');return;}
  __abort=false;openPipe();
  for(const p of PHASES){if(__abort)break;
    try{setPipe(p.id,'running','Đang tạo nội dung...');
      S.outputs[p.id]=parseJSON(await geminiText(genPrompt(p),true));delete S.scores[p.id];save();renderSteps();
      setPipe(p.id,'running','Đang chấm điểm...');
      S.scores[p.id]=parseJSON(await geminiText(scorePrompt(p),true));save();renderSteps();
      const sc=S.scores[p.id];setPipe(p.id,'done',sc.tong+'/100 · '+sc.ket_luan,sc.ket_luan);
    }catch(e){setPipe(p.id,'error',(e.message||'lỗi').slice(0,90));__abort=true;}}
  finishPipe();
}
function openPipe(){
  let ex=document.getElementById('pipeOverlay');if(ex)ex.remove();
  const d=document.createElement('div');d.id='pipeOverlay';d.className='overlay';
  d.innerHTML=`<div class="ovbox"><h2>⚡ Pipeline AI tự động</h2><p class="lead">AI chạy 5 giai đoạn và tự chấm điểm. Mỗi bước ~10-30 giây.</p>
    <div id="pipeRows"></div><div class="bar" id="pipeFoot" style="margin-top:14px"><button class="btn ghost" onclick="abortPipe()">Dừng sau bước hiện tại</button></div></div>`;
  document.body.appendChild(d);
  const rows=d.querySelector('#pipeRows');
  PHASES.forEach(p=>rows.insertAdjacentHTML('beforeend',`<div class="piperow" id="pipe-${p.id}"><span class="pnum">${p.n}</span><span class="pt">${p.title}</span><span class="ps" id="ps-${p.id}">chờ…</span></div>`));
}
function setPipe(id,state,msg,verdict){const r=document.getElementById('pipe-'+id),ps=document.getElementById('ps-'+id);if(!r)return;r.dataset.state=state;
  const col=state==='done'?(verdict==='SHIP'?'var(--ok)':verdict==='REVISE'?'var(--gold)':'var(--coral)'):state==='error'?'var(--coral)':'var(--blue)';
  ps.innerHTML=(state==='running'?'<span class="spinner"></span> ':'')+'<span style="color:'+col+'">'+esc(msg)+'</span>';}
function abortPipe(){__abort=true;toast("Sẽ dừng sau bước hiện tại...");}
function finishPipe(){const f=document.getElementById('pipeFoot');if(!f)return;const sc=scorecardObj();const done=PHASES.filter(p=>S.outputs[p.id]).length;
  f.innerHTML=`<button class="btn" onclick="closePipe();go('export')">Xem & Xuất file →</button><button class="btn ghost" onclick="closePipe()">Đóng</button>
    <span class="hint">Hoàn thành ${done}/5 · Overall ${sc.overall||'—'}/100</span>`;}
function closePipe(){const d=document.getElementById('pipeOverlay');if(d)d.remove();render();}

/* ---------- EXPORT ---------- */

/* ---------- NỐI VIRAL DOJO (cùng origin → chung localStorage 'dojo') ---------- */
const DOJO_URL_REL="../viral-dojo/app.html?start=1";
const DOJO_URL_ABS="https://haideman2025.github.io/viral-dojo/app.html?start=1";
function _today10(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _rid(){return Math.random().toString(36).slice(2,8);}

/* ---------- NỐI DOJO v2: chọn nhân vật + dự án + nhồi ảnh nhân vật chính ---------- */
function readDojo(){
  let raw;try{raw=JSON.parse(localStorage.getItem('dojo')||'null');}catch(e){raw=null;}
  if(!(raw&&raw.v===2&&raw.projects&&typeof raw.projects==='object')){
    const legacyDna=(raw&&raw.dna&&typeof raw.dna==='object')?raw.dna:null;const keys=(raw&&raw.keys)||{};const np={v:2,activeId:'',keys:keys,projects:{}};
    if(legacyDna){const lid='proj_'+_rid();np.projects[lid]={name:(legacyDna.onboard&&(legacyDna.onboard.kenh||legacyDna.onboard.nganh))||'Dự án 1',createdAt:_today10(),updatedAt:_today10(),dna:legacyDna};np.activeId=lid;}
    raw=np;
  }
  return raw;
}
function scaleDataUrl(dataUrl,max){return new Promise((res)=>{if(!dataUrl)return res('');const img=new Image();
  img.onload=()=>{let w=img.width,h=img.height,m=max||512;if(w>h&&w>m){h=Math.round(h*m/w);w=m;}else if(h>=w&&h>m){w=Math.round(w*m/h);h=m;}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);try{res(cv.toDataURL('image/jpeg',0.85));}catch(e){res(dataUrl);}};
  img.onerror=()=>res(dataUrl);img.src=dataUrl;});}
function personaDesc(p){return p.publicDescription||[p.ethnicityLook,p.vibe,p.visualStyle].filter(Boolean).join('. ');}
/* nhồi 1 nhân vật Muse vào dna 1 dự án Dojo: brandKit + onboard + ảnh nhân vật chính (vref + roster) */
function injectChar(dna,c,hero){
  const p=c.persona||{},intk=c.intake||{};
  const bk=JSON.parse(JSON.stringify((c.outputs&&c.outputs.brandkit)||{}));
  if(!bk.brand)bk.brand={ten:'',slogan:'',tone:'',khach:'',nen:'',khong:''};
  if(!Array.isArray(bk.products))bk.products=[];
  if(!bk.compliance)bk.compliance={cam:'',disclaimer:''};
  if(!bk.personas)bk.personas=[p.name,p.occupation,p.voiceTone,p.pov].filter(Boolean).join(' — ');
  dna.brandKit=bk;
  dna.onboard=Object.assign({nganh:intk.nganh||'',kenh:intk.ten||p.name||'',khach:intk.thi_truong||''},dna.onboard||{});
  dna.skuld=dna.skuld||{scored:[],deep:{},links:[],scripts:{},vref:{},vprompts:{},roster:[]};
  dna.skuld.vref=Object.assign({character:'',product:'',style:''},dna.skuld.vref||{});
  if(personaDesc(p))dna.skuld.vref.character=personaDesc(p);
  if(p.visualStyle)dna.skuld.vref.style=p.visualStyle;
  if(p.voiceTone)dna.skuld.vref.voice=p.voiceTone;
  if(hero)dna.skuld.vref.characterImg=hero;
  if(!Array.isArray(dna.skuld.roster))dna.skuld.roster=[];
  const ten=p.name||'Nhân vật';let e=dna.skuld.roster.find(x=>x.ten===ten);
  if(!e){e={id:'nv_'+_rid(),ten:ten,mo_ta:'',img:'',prompt:''};dna.skuld.roster.unshift(e);}
  e.mo_ta=(p.pov||p.personality||'').slice(0,140);if(hero)e.img=hero;
}

async function dojoDlgRefresh(){

  const host=document.getElementById('dlgHero');let hero='';try{hero=await IDB.get('ref:'+cid)||await IDB.get('portrait:'+cid)||'';}catch(e){}

async function dojoPickHero(charId){
  const c=S.characters[charId];if(!c||!(c.gallery||[]).length){toast('Nhân vật này chưa có ảnh Studio — tạo ở Studio ảnh');return;}
  let ex=document.getElementById('heroPick');if(ex)ex.remove();

  d.innerHTML=`<div class="ovbox"><h2>Chọn ảnh nhân vật chính</h2><p class="lead">Bấm 1 ảnh để đặt làm ảnh chính.</p><div class="imgrid" id="heroGrid"></div><div class="bar"><button class="btn ghost" onclick="document.getElementById('heroPick').remove()">Đóng</button></div></div>`;
  document.body.appendChild(d);const grid=document.getElementById('heroGrid');

    el.onclick=async()=>{await IDB.put('ref:'+charId,u);__refCache[charId]=u;if(c.persona)c.persona.hasRef=true;save();const hp=document.getElementById('heroPick');if(hp)hp.remove();dojoDlgRefresh();toast('Đã đặt ảnh chính');};grid.appendChild(el);}
}
function closeDojoDialog(){const d=document.getElementById('dojoDlg');if(d)d.remove();}
async function doSendDojo(charId,mode,targetId,openAfter){
  const c=S.characters[charId];const er=document.getElementById('dlgErr');if(er)er.style.display='none';
  if(!c){toast('Không tìm thấy nhân vật');return;}
  if(!(c.outputs&&c.outputs.brandkit&&c.outputs.brandkit.brand)){if(er){er.style.display='block';er.textContent='Nhân vật này chưa có Brand Kit (giai đoạn 5). Hoàn tất pipeline trước.';}return;}
  let hero='';try{hero=await IDB.get('ref:'+charId)||await IDB.get('portrait:'+charId)||'';}catch(e){}
  hero=hero?await scaleDataUrl(hero,512):'';
  const seamless=/(^|\.)github\.io$/i.test(location.hostname||'');
  if(!seamless){
    dl('05-brand-kit.json',JSON.stringify(c.outputs.brandkit,null,2),'application/json');
    if(hero)dlDataUrl('nhan-vat-'+((c.persona&&c.persona.name)||'char').replace(/[^\w]+/g,'_')+'.jpg',hero);
    window.open(DOJO_URL_ABS,'_blank');closeDojoDialog();toast('Khác origin — đã tải brand-kit + ảnh để nạp tay');return;
  }
  const raw=readDojo();const today=_today10();let pid;
  if(mode==='existing'&&targetId&&raw.projects[targetId]){pid=targetId;const p=raw.projects[pid];p.dna=p.dna||{onboard:{},m1:{},scores:{}};injectChar(p.dna,c,hero);p.updatedAt=today;}
  else{pid='proj_'+_rid();raw.projects[pid]={name:((c.intake&&c.intake.ten)||(c.persona&&c.persona.name)||c.name||'Muse').slice(0,60),createdAt:today,updatedAt:today,dna:{onboard:{},m1:{},scores:{}}};injectChar(raw.projects[pid].dna,c,hero);}
  raw.v=2;raw.activeId=pid;raw.keys=raw.keys||{};
  try{localStorage.setItem('dojo',JSON.stringify(raw));}catch(e){if(er){er.style.display='block';er.textContent='Không ghi được sang Dojo (có thể vượt dung lượng localStorage do ảnh): '+e.message;}return;}
  c.dojoLink={projectId:pid,projectName:raw.projects[pid].name,at:today};save();renderCharBar();
  closeDojoDialog();toast('Đã gửi "'+((c.persona&&c.persona.name)||c.name)+'" sang Dojo →');
  if(openAfter)setTimeout(()=>{location.href=DOJO_URL_REL;},450);
}
