function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dl(name,content,type){const b=new Blob([content],{type:type||'text/plain;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);}

/* ---------- IndexedDB cho ảnh chân dung (tách khỏi localStorage) ---------- */
const IDB={db:null,
  open(){return new Promise((res,rej)=>{if(IDB.db)return res(IDB.db);const r=indexedDB.open("muse_media",1);
    r.onupgradeneeded=()=>{r.result.createObjectStore("portraits");};
    r.onsuccess=()=>{IDB.db=r.result;res(IDB.db);};r.onerror=()=>rej(r.error);});},
  async put(k,v){const db=await IDB.open();return new Promise((res,rej)=>{const t=db.transaction("portraits","readwrite");t.objectStore("portraits").put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});},
  async get(k){const db=await IDB.open();return new Promise((res,rej)=>{const t=db.transaction("portraits","readonly");const rq=t.objectStore("portraits").get(k);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error);});}
};

/* ---------- GEMINI REST ---------- */
async function geminiText(prompt,jsonMode){
  if(!S.apiKey) throw new Error("Chưa nhập API key Gemini.");
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(S.modelText)}:generateContent?key=${encodeURIComponent(S.apiKey)}`;
  const body={contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7}};
  if(jsonMode) body.generationConfig.responseMimeType="application/json";
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){let t=await r.text();throw new Error("Gemini "+r.status+": "+t.slice(0,300));}
  const d=await r.json();
  const txt=d?.candidates?.[0]?.content?.parts?.map(p=>p.text).filter(Boolean).join("")||"";
  if(!txt) throw new Error("Gemini trả về rỗng (có thể bị chặn an toàn).");
  return txt;
}
async function geminiImage(prompt){
  if(!S.apiKey) throw new Error("Chưa nhập API key Gemini.");
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(S.modelImg)}:generateContent?key=${encodeURIComponent(S.apiKey)}`;
  const body={contents:[{parts:[{text:prompt}]}],generationConfig:{responseModalities:["IMAGE"]}};
  const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){let t=await r.text();throw new Error("Gemini image "+r.status+": "+t.slice(0,300));}
  const d=await r.json();
  const parts=d?.candidates?.[0]?.content?.parts||[];
  for(const p of parts){if(p.inlineData&&p.inlineData.data){return "data:"+(p.inlineData.mimeType||"image/png")+";base64,"+p.inlineData.data;}}
  throw new Error("Không nhận được ảnh (model ảnh có thể không khả dụng với key này — đổi tên model ở Thiết lập).");
}
function parseJSON(t){t=t.trim().replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();return JSON.parse(t);}

/* ---------- CONTEXT BUILDERS ---------- */
function personaContext(){
  const p=S.persona;if(!p||!p.name)return "";
  let s="NHÂN VẬT / PERSONA (trục nhân cách — mọi nội dung phải nhất quán giọng & góc nhìn này):\n";
  PERSONA_FIELDS.forEach(f=>{if(p[f.k])s+=`- ${f.label}: ${p[f.k]}\n`;});
  return s+"\n";
}
function intakeContext(){
  const i=S.intake;let s="THÔNG TIN THƯƠNG HIỆU (intake):\n";
  INTAKE_FIELDS.forEach(f=>{if(i[f.k])s+=`- ${f.label}: ${i[f.k]}\n`;});
  return s;
}
function priorContext(uptoId){
  let s="";for(const p of PHASES){if(p.id===uptoId)break;if(S.outputs[p.id])s+=`\n[${p.title}]\n`+JSON.stringify(S.outputs[p.id])+"\n";}

}

/* ---------- NAV / RENDER ---------- */
function go(id){S.stage=id;save();render();window.scrollTo(0,0);}
function intakeOK(){return INTAKE_FIELDS.filter(f=>f.req).every(f=>S.intake[f.k]&&String(S.intake[f.k]).trim());}
function personaOK(){return !!(S.persona&&S.persona.name&&S.persona.niche);}

function renderSteps(){
  const el=document.getElementById('steps');el.innerHTML='';
  STEP_LIST.forEach((st,i)=>{
    if(st.grp){const g=document.createElement('div');g.className='grp';g.textContent=st.grp;el.appendChild(g);}
    let done=false;
    if(st.id==='setup')done=!!S.apiKey;
    else if(st.id==='idea')done=!!(S.persona&&S.persona.name)||!!S.idea;
    else if(st.id==='persona'||st.id==='profile')done=personaOK();
    else if(st.id==='intake')done=intakeOK();
    else if(st.id==='storyboard')done=!!(S.storyboard&&S.storyboard.length);
    else if(st.id==='export')done=false;
    else done=!!S.outputs[st.id];
    const sc=S.scores[st.id];
    let badge='';if(sc){const c=sc.ket_luan==='SHIP'?'b-ok':sc.ket_luan==='REVISE'?'b-rev':'b-bad';badge=`<span class="badge ${c}">${sc.tong}</span>`;}
    const d=document.createElement('div');d.className='step'+(S.stage===st.id?' active':'')+(done?' done':'');
    d.innerHTML=`<span class="num">${done?'✓':(i+1)}</span><span>${st.title}</span>${badge}`;
    d.onclick=()=>go(st.id);el.appendChild(d);
  });
  const ph=PHASES.filter(p=>S.scores[p.id]);
  const os=document.getElementById('ovrScore'),on=document.getElementById('ovrNote');
  if(ph.length){const ov=Math.round(ph.reduce((a,p)=>a+S.scores[p.id].tong,0)/ph.length);
    os.textContent=ov;on.textContent=(ov>=82?"Sẵn sàng xây kênh viral ✓":"Cần cải thiện để ≥82.")+` (${ph.length}/5 giai đoạn)`;
  }else{os.textContent="—";on.textContent="Hoàn thành các giai đoạn để xem điểm tổng.";}
}
function render(){
  renderSteps();
  const m=document.getElementById('main');const id=S.stage;
  if(id==='setup')return renderSetup(m);
  if(id==='idea')return renderIdea(m);
  if(id==='persona')return renderPersona(m);
  if(id==='profile')return renderProfile(m);
  if(id==='intake')return renderIntake(m);
  if(id==='storyboard')return renderStoryboard(m);
  if(id==='export')return renderExport(m);
  renderPhase(m,PHASES.find(p=>p.id===id));
}

  const b=document.getElementById('aiIntake');b.disabled=true;b.innerHTML='<span class="spinner"></span> Đang gợi ý...';
  try{const o=parseJSON(await geminiText(intakeFromPersonaPrompt(),true));INTAKE_FIELDS.forEach(f=>{if(o[f.k]!=null)S.intake[f.k]=String(o[f.k]);});save();render();toast('AI đã gợi ý intake');}
  catch(e){er.style.display='block';er.textContent=e.message;b.disabled=false;b.innerHTML='✨ AI gợi ý từ persona';}
}

/* ---------- PHASE (generate + score, sửa tay) ---------- */
function renderPhase(m,p){
  const out=S.outputs[p.id];const sc=S.scores[p.id];
  m.innerHTML=`<h1>${p.n}. ${p.title}</h1><p class="lead">${p.desc}</p>
  ${!intakeOK()?'<div class="note" style="border-color:var(--coral);color:#ffb3b3">⚠ Hãy hoàn tất Intake (mục bắt buộc) trước khi chạy.</div>':''}
  <div class="bar">
    <button class="btn" id="genBtn" onclick="runGen('${p.id}')" ${intakeOK()?'':'disabled'}><span id="genTxt">${out?'Tạo lại bằng AI':'Tạo bằng AI'}</span></button>
    <button class="btn gold" onclick="runScore('${p.id}')" ${out?'':'disabled'}>Tự chấm điểm</button>
    ${p.note?`<span class="hint">${p.note}</span>`:''}
  </div>
  <div class="err" id="phErr"></div>
  <label style="margin-top:16px">Kết quả (JSON — bạn có thể sửa tay)</label>
  <textarea class="big" id="outBox" placeholder="Bấm 'Tạo bằng AI' để sinh nội dung...">${out?esc(JSON.stringify(out,null,2)):''}</textarea>
  <div class="bar"><button class="btn ghost" onclick="saveOut('${p.id}')">Lưu chỉnh sửa</button>
   <span class="hint">Sửa xong nhớ Lưu để các bước sau &amp; chấm điểm dùng bản mới.</span></div>
  <div id="scoreBox"></div>
  <div class="bar" style="margin-top:22px">
    ${p.n>1?`<button class="btn ghost" onclick="go('${PHASES[p.n-2].id}')">← Quay lại</button>`:`<button class="btn ghost" onclick="go('intake')">← Intake</button>`}
    ${p.n<5?`<button class="btn blue" onclick="go('${PHASES[p.n].id}')">Tiếp →</button>`:`<button class="btn blue" onclick="go('storyboard')">Tới Storyboard →</button>`}
  </div>`;
  if(sc)renderScore(sc,p);
}
function renderScore(sc,p){
  const c=sc.ket_luan==='SHIP'?'var(--ok)':sc.ket_luan==='REVISE'?'var(--gold)':'var(--coral)';
  let h=`<div class="card"><div class="scorehead"><span class="total" style="color:${c}">${sc.tong}</span><span class="hint">/100 · Gate ${p.gate} · <b style="color:${c}">${sc.ket_luan}</b></span></div>
  <table class="score-tbl"><tr><th>Yếu tố</th><th>Điểm</th><th>Lý do</th></tr>`;
  (sc.factors||[]).forEach(f=>h+=`<tr><td>${esc(f.ten)}</td><td>${esc(f.diem)}/${esc(f.trong_so)}</td><td>${esc(f.ly_do)}</td></tr>`);
  h+=`</table>${sc.ket_luan!=='SHIP'?'<div class="note">Điểm dưới chuẩn → sửa yếu tố thấp rồi "Tạo lại" hoặc sửa tay, sau đó chấm lại.</div>':''}</div>`;
  document.getElementById('scoreBox').innerHTML=h;
}
function busy(btnId,txtId,on,label){const b=document.getElementById(btnId);if(!b)return;b.disabled=on;if(txtId){document.getElementById(txtId).innerHTML=on?'<span class="spinner"></span> '+label:label;}}
async function runGen(id){
  const p=PHASES.find(x=>x.id===id);const err=document.getElementById('phErr');err.style.display='none';
  busy('genBtn','genTxt',true,'Đang tạo...');
  try{const j=parseJSON(await geminiText(genPrompt(p),true));S.outputs[id]=j;delete S.scores[id];save();render();toast("Đã tạo "+p.title);}
  catch(e){err.style.display='block';err.textContent=e.message;busy('genBtn','genTxt',false,'Tạo bằng AI');}
}
async function runScore(id){
  const p=PHASES.find(x=>x.id===id);saveOut(id,true);const err=document.getElementById('phErr');err.style.display='none';
  if(!S.outputs[id]){err.style.display='block';err.textContent="Chưa có nội dung để chấm.";return;}
  toast("Đang chấm điểm...");
  try{const j=parseJSON(await geminiText(scorePrompt(p),true));S.scores[id]=j;save();renderSteps();renderScore(j,p);}
  catch(e){err.style.display='block';err.textContent=e.message;}
}
function saveOut(id,silent){const box=document.getElementById('outBox');if(!box)return;try{S.outputs[id]=JSON.parse(box.value);delete S.scores[id];save();if(!silent){toast("Đã lưu");renderSteps();}}catch(e){if(!silent){const err=document.getElementById('phErr');err.style.display='block';err.textContent="JSON không hợp lệ: "+e.message;}}}

/* ---------- AUTO PIPELINE ---------- */
let __abort=false;
async function startAutoPipeline(){
  saveIntake();
  if(!intakeOK()){toast("Thiếu thông tin bắt buộc (*)");go('intake');return;}
  if(!S.apiKey){toast("Chưa có API key");go('setup');return;}
  __abort=false;openPipe();
  for(const p of PHASES){
    if(__abort)break;
    try{
      setPipe(p.id,'running','Đang tạo nội dung...');
      S.outputs[p.id]=parseJSON(await geminiText(genPrompt(p),true));delete S.scores[p.id];save();renderSteps();
      setPipe(p.id,'running','Đang chấm điểm...');
      S.scores[p.id]=parseJSON(await geminiText(scorePrompt(p),true));save();renderSteps();
      const sc=S.scores[p.id];setPipe(p.id,'done',sc.tong+'/100 · '+sc.ket_luan,sc.ket_luan);
    }catch(e){setPipe(p.id,'error',(e.message||'lỗi').slice(0,90));__abort=true;}
  }
  finishPipe();
}
function openPipe(){
  let ex=document.getElementById('pipeOverlay');if(ex)ex.remove();
  const d=document.createElement('div');d.id='pipeOverlay';d.className='overlay';
  d.innerHTML=`<div class="ovbox"><h2>⚡ Pipeline AI tự động</h2>
    <p class="lead">AI chạy 5 giai đoạn và tự chấm điểm. Mỗi bước ~10-30 giây.</p>
    <div id="pipeRows"></div>
    <div class="bar" id="pipeFoot" style="margin-top:14px"><button class="btn ghost" onclick="abortPipe()">Dừng sau bước hiện tại</button></div></div>`;
  document.body.appendChild(d);
  const rows=d.querySelector('#pipeRows');
  PHASES.forEach(p=>rows.insertAdjacentHTML('beforeend',
    `<div class="piperow" id="pipe-${p.id}"><span class="pnum">${p.n}</span><span class="pt">${p.title}</span><span class="ps" id="ps-${p.id}">chờ…</span></div>`));
}
function setPipe(id,state,msg,verdict){
  const r=document.getElementById('pipe-'+id),ps=document.getElementById('ps-'+id);if(!r)return;
  r.dataset.state=state;
  const col=state==='done'?(verdict==='SHIP'?'var(--ok)':verdict==='REVISE'?'var(--gold)':'var(--coral)'):state==='error'?'var(--coral)':'var(--blue)';
  ps.innerHTML=(state==='running'?'<span class="spinner"></span> ':'')+'<span style="color:'+col+'">'+esc(msg)+'</span>';
}
function abortPipe(){__abort=true;toast("Sẽ dừng sau bước hiện tại...");}
function finishPipe(){
  const f=document.getElementById('pipeFoot');if(!f)return;const sc=scorecardObj();
  const done=PHASES.filter(p=>S.outputs[p.id]).length;
  f.innerHTML=`<button class="btn" onclick="closePipe();go('storyboard')">Tạo Storyboard →</button>
    <button class="btn ghost" onclick="closePipe();go('export')">Tới Xuất file</button>
    <button class="btn ghost" onclick="closePipe()">Đóng</button>
    <span class="hint">Hoàn thành ${done}/5 · Overall ${sc.overall||'—'}/100</span>`;
}
function closePipe(){const d=document.getElementById('pipeOverlay');if(d)d.remove();render();}

/* ---------- STORYBOARD ---------- */
function renderStoryboard(m){
  const sb=S.storyboard;
  m.innerHTML=`<h1>Storyboard 30 ngày</h1>
  <p class="lead">Hook theo giọng persona + imagePrompt + caption (chỉ text — bạn tự đổ ảnh sau).</p>
  <div class="bar">
    <button class="btn" id="sbBtn" onclick="genStoryboard()" ${personaOK()?'':'disabled'}><span id="sbTxt">${sb?'Tạo lại 30 ngày':'Tạo storyboard 30 ngày'}</span></button>
    ${sb?'<button class="btn ghost" onclick="dlStoryboard()">⬇ storyboard.json</button>':''}
    ${!S.outputs.comms?'<span class="hint">Nên chạy giai đoạn 2 (Truyền thông) trước để bám pillars/calendar.</span>':''}
  </div>
  <div class="err" id="sbErr"></div>
  <div id="sbList"></div>
  <div class="bar" style="margin-top:22px"><button class="btn ghost" onclick="go('brandkit')">← Quay lại</button>
   <button class="btn blue" onclick="go('export')">Tới Xuất file →</button></div>`;
  if(sb&&sb.length)document.getElementById('sbList').innerHTML=sb.map(s=>`<div class="sb-card"><div class="d">NGÀY ${esc(s.day)} · Trụ ${esc(s.pillar)}</div><div class="h">${esc(s.hook)}</div><div class="hint">${esc(s.scene||'')}</div><code title="bấm để copy" onclick="navigator.clipboard.writeText(this.textContent);toast('Đã copy imagePrompt')">${esc(s.imagePrompt||'')}</code><div class="hint" style="margin-top:6px"><b>Caption:</b> ${esc(s.caption||'')}</div></div>`).join('');
}
async function genStoryboard(){
  if(!personaOK()){toast("Cần nhân vật trước");go('persona');return;}
  if(!S.apiKey){toast('Chưa có API key');go('setup');return;}
  const er=document.getElementById('sbErr');er.style.display='none';
  busy('sbBtn','sbTxt',true,'Đang dựng 30 ngày...');
  try{let j=parseJSON(await geminiText(storyboardPrompt(30),true));if(!Array.isArray(j)&&j.storyboard)j=j.storyboard;S.storyboard=j;save();render();toast("Đã tạo storyboard");}
  catch(e){er.style.display='block';er.textContent=e.message;busy('sbBtn','sbTxt',false,'Tạo storyboard 30 ngày');}
}
function dlStoryboard(){dl("storyboard.json",JSON.stringify(S.storyboard,null,2),"application/json");}

/* ---------- EXPORT ---------- */
function slug(){return (S.intake.ten||S.persona.name||"brand").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")||"brand";}
function mdFor(id){const o=S.outputs[id];if(!o)return "";return "# "+(PHASES.find(p=>p.id===id)?.title||id)+"\n\n```json\n"+JSON.stringify(o,null,2)+"\n```\n";}
function scorecardObj(){
  const gd=PHASES.filter(p=>S.scores[p.id]).map(p=>({ma:String(p.n),ten:p.title,gate:p.gate,...S.scores[p.id]}));
  const ov=gd.length?Math.round(gd.reduce((a,x)=>a+x.tong,0)/gd.length):0;
  return {giai_doan:gd,overall:ov,san_sang_xay_kenh:ov>=82};
}
function buildCommandCenter(){
  const comms=S.outputs.comms||{},brand=S.outputs.brandkit?.brand||{},strat=S.outputs.brand||{},p=S.persona||{};
  const DATA={brand:brand.ten||S.intake.ten||p.name||"Brand",tagline:brand.slogan||S.intake.mota||"",positioning:strat.positioning_statement||"",
    persona:{name:p.name||"",niche:p.niche||"",pov:p.pov||"",voice:p.voiceTone||"",vibe:p.vibe||""},
    hooks:(comms.hook_bank||[]).map(h=>({p:h.pillar,t:h.co_che,x:h.hook})),
    pillars:(comms.pillars||[]).map(x=>({ma:x.ma,ten:x.ten,vai_tro:x.vai_tro,noi_dung:x.noi_dung,ty_le:x.ty_le})),
    calendar:(comms.calendar_30||[]).map(c=>({d:c.ngay,p:c.pillar,t:c.chu_de,f:c.format}))};
  return CC_TEMPLATE.replace(/__BRAND__/g,esc(DATA.brand)).replace("__DATA__",JSON.stringify(DATA));
}
function renderExport(m){
  const ready=PHASES.every(p=>S.outputs[p.id]);
  const sc=scorecardObj();
  m.innerHTML=`<h1>Xuất toàn bộ file</h1>
  <p class="lead">Tải bộ dữ liệu chuẩn. Quan trọng nhất: <b>05-brand-kit.json</b> nạp ở "Hồ sơ Sản phẩm chuẩn" của tool viral; còn lại thả vào Brand Vault.</p>
  ${ready?'':'<div class="note" style="border-color:var(--gold);color:var(--gold)">⚠ Chưa đủ 5 giai đoạn. Vẫn tải được phần đã có.</div>'}
  <div class="card"><div class="scorehead"><span class="total" style="color:var(--teal)">${sc.overall||'—'}</span><span class="hint">/100 Overall · ${sc.san_sang_xay_kenh?'<b style="color:var(--ok)">Sẵn sàng xây kênh ✓</b>':'Nên đạt ≥82'}</span></div></div>
  <div class="card"><h2>Tải từng file</h2>
    <div class="bar">
      <button class="btn gold" onclick="dlBrandKit()" ${S.outputs.brandkit?'':'disabled'}>⬇ 05-brand-kit.json (import app)</button>
      <button class="btn ghost" onclick="dlMd('brand','01-brand-strategy')" ${S.outputs.brand?'':'disabled'}>01 brand-strategy.md</button>
      <button class="btn ghost" onclick="dlMd('comms','02-comms-strategy')" ${S.outputs.comms?'':'disabled'}>02 comms.md</button>
      <button class="btn ghost" onclick="dlMd('product','03-product-strategy')" ${S.outputs.product?'':'disabled'}>03 product.md</button>
      <button class="btn ghost" onclick="dlMd('insight','04-customer-insight')" ${S.outputs.insight?'':'disabled'}>04 insight.md</button>
      <button class="btn ghost" onclick="exportPersona()">persona.json</button>
      <button class="btn ghost" onclick="dlStoryboard()" ${S.storyboard?'':'disabled'}>storyboard.json</button>
      <button class="btn ghost" onclick="dlScorecard()">06 scorecard.json</button>
      <button class="btn blue" onclick="dlCC()" ${S.outputs.comms?'':'disabled'}>⬇ index.html (Command Center)</button>
    </div>
  </div>
  <div class="bar"><button class="btn" onclick="dlAll()">⬇⬇ Tải tất cả</button>
   <button class="btn ghost" onclick="go('storyboard')">← Quay lại</button></div>
  <div class="note">Sau khi tải: ở app viral → "Hồ sơ Sản phẩm chuẩn" → Nạp file → chọn <b>05-brand-kit.json</b>. Thả 01–04 + persona + storyboard + scorecard + index.html vào <b>Brand Vault</b>.</div>`;
}
function dlBrandKit(){dl("05-brand-kit.json",JSON.stringify(S.outputs.brandkit,null,2),"application/json");}
function dlMd(id,name){dl(name+".md",mdFor(id),"text/markdown");}
function dlScorecard(){dl("06-scorecard.json",JSON.stringify(scorecardObj(),null,2),"application/json");}
function dlCC(){dl("index.html",buildCommandCenter(),"text/html");}
function dlAll(){
  let i=0;const q=(fn)=>setTimeout(fn,180*(++i));
  if(S.outputs.brandkit)q(()=>dlBrandKit());
  if(S.persona&&S.persona.name)q(()=>exportPersona());
  if(intakeOK())q(()=>downloadIntake());
  ["brand|01-brand-strategy","comms|02-comms-strategy","product|03-product-strategy","insight|04-customer-insight"].forEach(x=>{const[id,nm]=x.split("|");if(S.outputs[id])q(()=>dlMd(id,nm));});
  if(S.storyboard)q(()=>dlStoryboard());
  q(()=>dlScorecard());
  if(S.outputs.comms)q(()=>dlCC());
  toast("Đang tải bộ file...");
}

      <button class="btn" onclick="S.ageOk=true;save();document.getElementById('ageGate').remove();">Tôi đủ 18 tuổi — Tiếp tục</button>

  document.body.appendChild(d);
}

<body><div class="wrap"><div style="color:var(--teal);font-size:11px;letter-spacing:3px;font-weight:700">__BRAND__ · COMMAND CENTER</div><h1 id="h1"></h1><p class="sub" id="sub"></p><div class="posit" id="posit"></div><div class="persona" id="per"></div>

<\/script></body></html>`;

maybeAgeGate();
render();
